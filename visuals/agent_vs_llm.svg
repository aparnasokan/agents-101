<svg viewBox="0 0 480 280" xmlns="http://www.w3.org/2000/svg"><rect width="480" height="280" fill="#031114"/><text x="24" y="34" fill="#fff" font-size="16" font-family="Montserrat,Arial">LLM Call vs AI Agent</text><rect x="30" y="70" width="190" height="120" rx="10" fill="rgba(29,244,244,.08)" stroke="#1df4f4"/><text x="50" y="102" fill="#1df4f4" font-size="12" font-family="Montserrat,Arial">LLM Call</text><text x="50" y="132" fill="#fff" font-size="11" font-family="Montserrat,Arial">Prompt in</text><text x="50" y="158" fill="#fff" font-size="11" font-family="Montserrat,Arial">Answer out</text><rect x="260" y="70" width="190" height="120" rx="10" fill="rgba(162,243,243,.08)" stroke="#a2f3f3"/><text x="280" y="102" fill="#a2f3f3" font-size="12" font-family="Montserrat,Arial">AI Agent</text><text x="280" y="132" fill="#fff" font-size="11" font-family="Montserrat,Arial">Goal → plan</text><text x="280" y="158" fill="#fff" font-size="11" font-family="Montserrat,Arial">Tools → observe → adapt</text><text x="38" y="230" fill="rgba(255,255,255,.65)" font-size="10" font-family="Montserrat,Arial">Use when contrasting a single model response with goal-directed action.</text></svg>